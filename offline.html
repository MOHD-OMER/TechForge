<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#030508"/>
  <title>Offline — TechForge</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg"/>
  <style>
    /* Inline so the page renders even when no CSS is cached. */
    :root { --bg:#030508; --card:#0a0f17; --border:#1a2333; --text:#e6edf6; --text2:#8aa0c0; --accent:#00d4ff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html,body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'IBM Plex Sans', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px; text-align: center;
    }
    .wrap { max-width: 460px; }
    .logo {
      width: 56px; height: 56px; margin: 0 auto 24px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,212,255,.08); border: 1px solid rgba(0,212,255,.25);
      font-size: 28px; color: var(--accent);
    }
    h1 { font-size: 26px; font-weight: 700; letter-spacing: -.5px; margin-bottom: 12px; }
    h1 span { color: var(--accent); }
    p { color: var(--text2); font-size: 15px; line-height: 1.7; margin-bottom: 28px; }
    .btn {
      display: inline-block; cursor: pointer; border: 1px solid rgba(0,212,255,.3);
      background: rgba(0,212,255,.08); color: var(--accent);
      padding: 12px 26px; border-radius: 999px; font-size: 14px; font-weight: 600;
      text-decoration: none; transition: background .2s;
    }
    .btn:hover { background: rgba(0,212,255,.16); }
    .hint { margin-top: 22px; font-size: 12px; color: var(--text2); opacity: .7; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">⬡</div>
    <h1>You're <span>offline</span></h1>
    <p>This page isn't cached yet and there's no connection right now. Pages you've already visited still work offline — head back and keep learning.</p>
    <a class="btn" href="/index.html">⬡ Go to Home</a>
    <button class="btn" style="margin-left:8px;" onclick="location.reload()">↻ Retry</button>
    <div class="hint">TechForge caches visited pages for offline reading.</div>
  </div>
</body>
</html>
