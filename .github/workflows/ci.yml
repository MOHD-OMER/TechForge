name: CI — Validate HTML, Links & Accessibility

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install html5validator
        run: pip install html5validator

      - name: Validate HTML
        run: |
          html5validator --root . \
            --match "*.html" \
            --ignore 'This document appears to be written' \
            --ignore 'Section lacks heading' \
            --ignore-re 'CSS:' \
            --log INFO

  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --root-dir ${{ github.workspace }}
            --exclude-path 'assets|404.html|offline.html'
            --exclude 'localhost'
            --exclude '127.0.0.1'
            --exclude 'leetcode.com'
            --timeout 30
            --max-retries 2
            './**/*.html'
          fail: true

  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dev tooling
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run axe-core WCAG 2.1 AA audit (dark + light themes)
        run: npm run a11y -- --fail-on=serious

      - name: Upload a11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: a11y-report.json
